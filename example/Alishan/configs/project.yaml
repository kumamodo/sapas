# ==========================================
# Station Configuration
# ==========================================

# Define connectivity for all physical hardware units
link:
  # --- MAIN DUT: Primary Device Under Test ---
  main_dut:
    type: ssh                # Connection type: supports ssh, adb, com
    host: 192.168.1.110      # Device IP address
    user: kumamodo           # Login username
    password:                # Login password
    stop_chars: ':~$'        # [Optional] Shell prompt termination characters

  main_mcu:
    type: "udp"
    host: "192.168.1.111"
    server_port: 5088
    client_port: 5088

  # --- Dual-mode ADB Target ---
  dut1:
    type: adb                          # Connection type: supports adb
    usb_serial: "1234567890ABCDEF"     # [Optional] Physical USB serial number (Priority 1)
    network_host: "192.168.1.110:5555" # [Optional] Network host address for fallback (Priority 2)